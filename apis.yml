aid: api-sports
name: API-Sports
description: >-
  API-Sports is a leading provider of real-time sports data and statistics APIs
  for businesses and developers. They offer 35+ APIs covering football, basketball,
  baseball, tennis, rugby, volleyball, handball, ice hockey, MMA, and more, with
  live scores, fixtures, standings, player statistics, and historical data
  accessible via a unified API key authentication model.
